name: procolis
description: PRO COLIS - Gestion de colis interurbains
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  dio: ^5.3.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.18.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.0
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  permission_handler: ^11.0.1
  flutter_local_notifications: ^17.2.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_messaging_web: ^4.1.5
  google_fonts: ^8.1.0
  geocoding: ^4.0.0
  uuid: ^4.5.3
  image_picker: ^1.1.2
  video_player: ^2.8.1
  universal_html: ^2.2.4 
  http_parser: ^4.1.2
  chewie: ^1.8.1
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: fonts/Poppins/Poppins-Bold.ttf
          weight: 700
        - asset: fonts/Poppins/Poppins-ExtraBold.ttf
          weight: 800
        - asset: fonts/Poppins/Poppins-Italic.ttf
          weight: 400
          style: italic
        - asset: fonts/Poppins/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
          
    - family: Inter
      fonts:
        - asset: fonts/Inter/Inter-VariableFont_opsz,wght.ttf
          weight: 400
        - asset: fonts/Inter/Inter-Italic-VariableFont_opsz,wght.ttf
          weight: 400
          style: italic

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icone_procolis.png"
  adaptive_icon_background: "#0B6E3A"
  adaptive_icon_foreground: "assets/images/icone_procolis_foreground.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icone_procolis.png"
    background_color: "#0B6E3A"
    theme_color: "#0B6E3A"
  windows:
    generate: true
    image_path: "assets/images/icone_procolis.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/icone_procolis.png"